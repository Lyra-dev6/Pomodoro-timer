<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="pomodoro-container">
        <div class="mode-buttons">
            <button id="pomodoro-btn" class="mode-btn active">Pomodoro</button>
            <button id="short-break-btn" class="mode-btn">Short Break</button>
            <button id="long-break-btn" class="mode-btn">Long Break</button>
        </div>

        <div id="timer-display" style="text-align: center; font-size: 50px; margin: 20px 0;">25:00</div>

        <div class="control-buttons">
            <button id="start">Start</button>
            <button id="pause">Pause</button>
            <button id="reset">Reset</button>
        </div>
    </div>
    
    <script src="script.js"></script>
    <!-- A short, clean click sound -->
<audio id="click-sound" src="https://soundjay.com" preload="auto"></audio>
<audio id="alarm" src="https://soundjay.com"></audio>


</body>
</html>
